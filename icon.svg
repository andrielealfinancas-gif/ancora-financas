<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <rect width="512" height="512" rx="112" fill="#7F77DD"/>
  <rect width="512" height="512" rx="112" fill="#EEEDFE" opacity="0.08"/>

  <!-- Lua crescente, formada por dois círculos sobrepostos -->
  <mask id="moonMask">
    <rect width="512" height="512" fill="black"/>
    <circle cx="246" cy="266" r="108" fill="white"/>
    <circle cx="296" cy="236" r="92" fill="black"/>
  </mask>
  <circle cx="246" cy="266" r="108" fill="#fff" mask="url(#moonMask)"/>

  <!-- Estrela grande, ao lado superior direito da lua -->
  <path d="M 352 118
           L 364 154
           L 400 166
           L 364 178
           L 352 214
           L 340 178
           L 304 166
           L 340 154
           Z"
        fill="#fff"/>

  <!-- Estrelinha pequena, abaixo e à direita -->
  <path d="M 376 296
           L 382 312
           L 398 318
           L 382 324
           L 376 340
           L 370 324
           L 354 318
           L 370 312
           Z"
        fill="#fff" opacity="0.85"/>

  <!-- Brilho sutil no fundo -->
  <ellipse cx="256" cy="120" rx="180" ry="60" fill="#fff" opacity="0.06"/>
</svg>
